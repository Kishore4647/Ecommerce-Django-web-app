# .github/workflows/ci.yml
# GitHub Actions runs this file automatically on every git push or pull request.
# It's like a robot that tests your code before it goes live.

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: Test the Django Backend ─────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest   # GitHub provides a free Ubuntu VM

    services:
      # Spin up a real Redis for Celery tests
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'   # Cache pip packages to speed up future runs

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run Django checks
        working-directory: backend
        env:
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: 'True'
        run: python manage.py check

      - name: Run migrations check
        working-directory: backend
        env:
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: 'True'
        run: python manage.py migrate --run-syncdb

      - name: Run tests
        working-directory: backend
        env:
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: 'True'
          REDIS_URL: redis://localhost:6379/0
        run: python manage.py test --verbosity=2

  # ─── Job 2: Test the React Frontend ─────────────────────────────────────────
  test-frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_API_URL: https://placeholder.onrender.com
        run: npm run build

  # ─── Job 3: Deploy to Render (only on push to main) ──────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]   # Only deploy if both tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy
        # Render provides a deploy hook URL — store it as a GitHub Secret
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Deploy triggered on Render!"
