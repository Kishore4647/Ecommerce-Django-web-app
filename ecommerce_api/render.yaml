# render.yaml — Render deployment configuration
# This file tells Render how to build and run your services.
# Commit this file to your GitHub repo, then connect it on render.com

services:
  # ─── Django Web Service ──────────────────────────────────────────────────────
  - type: web
    name: ecommerce-api
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: gunicorn ecommerce.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure secret
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: ecommerce-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ecommerce-redis
          type: redis
          property: connectionString
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false      # You enter this manually in Render dashboard
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false      # Set to your frontend URL after deploying frontend

  # ─── Celery Worker ───────────────────────────────────────────────────────────
  - type: worker
    name: ecommerce-celery
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A ecommerce worker --loglevel=info --concurrency=2
    envVars:
      - key: SECRET_KEY
        fromService:
          name: ecommerce-api
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: ecommerce-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ecommerce-redis
          type: redis
          property: connectionString
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false

  # ─── Redis (for Celery broker) ───────────────────────────────────────────────
  - type: redis
    name: ecommerce-redis
    region: singapore
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  # ─── PostgreSQL (Render's free managed DB) ───────────────────────────────────
  # NOTE: Render Free tier only offers PostgreSQL, not MySQL.
  # The code works with both — dj-database-url handles the connection.
  - name: ecommerce-db
    region: singapore
    plan: free
